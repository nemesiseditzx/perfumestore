<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA Admin</title>

<style>
body{background:#0a0a08;color:#fff;font-family:sans-serif;padding:20px}
table{width:100%;margin-top:20px;border-collapse:collapse}
td,th{padding:10px;border-bottom:1px solid #333}
button{padding:8px 14px;background:gold;border:none;cursor:pointer}
input{padding:6px;margin:5px}
</style>
</head>

<body>

<h1>AURA Admin Panel</h1>

<h2>Products</h2>
<div id="products"></div>

<h2>Add Product</h2>
<input id="name" placeholder="Name">
<input id="price" placeholder="Price">
<input id="stock" placeholder="Stock">
<button onclick="addProduct()">Add</button>

<script>

// ✅ API
const API = "https://perfumestore-backend-production.up.railway.app";

// ✅ USD FORMAT
function USD(x){
  return x.toLocaleString("en-US",{
    style:"currency",
    currency:"USD"
  });
}

// 🚀 LOAD PRODUCTS
async function loadProducts(){
  const res = await fetch(API+"/products");
  const data = await res.json();

  document.getElementById("products").innerHTML =
    data.map(p=>`
      <table>
        <tr>
          <td>${p.name}</td>
          <td>${USD(p.price)}</td>
          <td>${p.stock}</td>
        </tr>
      </table>
    `).join('');
}

// ➕ ADD PRODUCT
async function addProduct(){
  const name = document.getElementById("name").value;
  const price = parseInt(document.getElementById("price").value);
  const stock = parseInt(document.getElementById("stock").value);

  await fetch(API+"/products",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name,price,stock})
  });

  loadProducts();
}

// INIT
loadProducts();

</script>

</body>
</html>
